version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shop_vape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: loza
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shop_vape
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: loza
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/app/uploads
    ports:
      - "777:80"
    depends_on:
      - app

volumes:
  pgdata: